<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stress Result</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Your Stress Result</h1>

    <h2></h2>

    <h3></h3>

    <p><b>Recommendations</b></p>

    <ul style="text-align:left;">
        <li>✔ Sleep 7–8 hours daily.</li>
        <li>✔ Exercise regularly.</li>
        <li>✔ Take regular study breaks.</li>
        <li>✔ Practice meditation.</li>
        <li>✔ Stay connected with family and friends.</li>
    </ul>

</div>

<script>
let score = Number(localStorage.getItem("score"));

let level = "";

if (score <= 20) {
    level = "Low Stress";
} else if (score <= 35) {
    level = "Moderate Stress";
} else if (score <= 50) {
    level = "High Stress";
} else {
    level = "Severe Stress";
}

document.querySelector("h2").innerHTML = level;
document.querySelector("h3").innerHTML = "Stress Score: " + score + " / 60";
</script>

</body>
</html>
